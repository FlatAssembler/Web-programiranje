<!DOCTYPE html>
<html>
    <head>
        <title>Filmovi koje nudimo razvrstani po ratingu</title>
        <meta name="viewport" content="width=device-width, initial-width=1"/>
        <style>
            @media (min-width: 1024px) {
                :root {
                    --positive-color: lightblue;
                    --negative-color: white;
                }
                .histogram:nth-of-type(1) {
                    /* PG-13 */
                    background: linear-gradient(to right, var(--positive-color) 0% calc((2 / 20) * 100%),
                                                      var(--negative-color) calc((2 / 20) * 100%) 100%);
                }
                .histogram:nth-of-type(2) {
                    /* TV-MA */
                    background: linear-gradient(to right, var(--positive-color) 0% calc((13 / 20) * 100%),
                                                      var(--negative-color) calc((13 / 20) * 100%) 100%);
                }

                .histogram:nth-of-type(3) {
                    /* PG */
                    background: linear-gradient(to right, var(--positive-color) 0% calc((1 / 20) * 100%),
                                                      var(--negative-color) calc((1 / 20) * 100%) 100%);
                }

                .histogram:nth-of-type(4) {
                    /* TV-14 */
                    background: linear-gradient(to right, var(--positive-color) 0% calc((2 / 20) * 100%),
                                                      var(--negative-color) calc((2 / 20) * 100%) 100%);
                }
                .histogram:nth-of-type(5) {
                    /* TV-PG */
                    background: linear-gradient(to right, var(--positive-color) 0% calc((2 / 20) * 100%),
                                                      var(--negative-color) calc((2 / 20) * 100%) 100%);
                }
                .divWithHistograms {
                    display: block;
                }
                .divWithPieChart {
                    display: none;
                }
                main {
                    display: grid;
                    grid-template-areas: "header ."
                                        "menu ."
                                        "divWithHistograms aside";
                }
                .divWithHistograms .historgram:hover {
                    height: 24px;
                    line-height: 24px;
                }
            }
            @media (max-width: 1024px) {
                .divWithPieChart {
                    display: block;
                }
                .pieChart {
                    background:
                     radial-gradient(white 0% 50%,
                                     transparent 50% 75%,
                                   white 75% 100%),
                    conic-gradient(red 0% calc((2 / 20) * 100%),
                                                yellow calc((2 / 20) * 100%) calc(((2 + 13) / 20) * 100%),
                                                green calc(((2 + 13) / 20) * 100%) calc(((2 + 13 + 1) / 20) * 100%),
                                                blue calc(((2 + 13 + 1) / 20) * 100%) calc(((2 + 13 + 1 + 2) / 20) * 100%),
                                                purple calc(((2 + 13 + 1 + 2) / 20) * 100%) 100%
                                                );
                    border-radius: 50%;
                    width: calc(100vw - 70px);
                    height: calc(100vw - 70px);
                    margin-bottom: 50px;
                }
                .divWithHistograms {
                    display: none;
                }

                figcaption {
                    text-align: center;
                }
                main {
                    display: block;
                }
                #menu {
                    display: block;
                    width: calc(100% - 20px);
                }
            }
            main h1 {
                grid-area: header;
            }
            main .divWithHistograms {
                grid-area: divWithHistograms;
            }
            main .divWithPieChart {
                grid-area: divWithPieChart;
            }
            main aside {
                grid-area: aside;
            }
            aside figure img {
                width: calc(100% - 30px);
            }
            #menu {
                position: relative;
            }
            #menu nav {
                display: none;
            }
            #menu:hover + nav {
                display: block;
                position: absolute;
            }
            #divSIzbornikom {
                grid-area: menu;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Ovdje su filmovi koje nudimo razvrstani po ratingu:</h1>
            <div id="divSIzbornikom">
            <button id="menu">izbornik
                <nav>
                    Neki izbornik...
                </nav>
            </button>
            </div>
            <div class="divWithHistograms">
                <p>PG-13</p>
                <div class="histogram">2 / 20</div>
                <p>TV-MA</p>
                <div class="histogram">13 / 20</div>
                <p>PG</p>
                <div class="histogram">1 / 20</div>
                <p>TV-14</p>
                <div class="histogram">2 / 20</div>
                <p>TV-PG</p>
                <div class="histogram">2 / 20</div>
            </div>
            <div class="divWithPieChart">
                <figure>
                <div class="pieChart"></div>
                <figcaption>
                    PG-13 - 2 / 20, TV-MA - 13 / 20, PG - 1 / 20, TV-14 - 2 / 20, TV-PG - 2 / 20
                </figcaption>
                </figure>
            </div>
            <aside>
                <figure>
                    <img src="https://static.wikia.nocookie.net/mlp/images/c/c4/Rainbow_Dash_S2E7_thumb.png/revision/latest/scale-to-width-down/209?cb=20120821161947">
                    <figcaption>A character from My Little Pony</figcaption>
                </figure>
            </aside>
        </main>
    </body>
</html>
